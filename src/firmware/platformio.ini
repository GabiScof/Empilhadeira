; PlatformIO — firmware do ESP32 (baixo nível, tempo real).
;
; Platform espressif32@^6.0.0 garante Arduino Core 2.x, que usa a API LEDC
; por CANAL (ledcSetup + ledcAttachPin + ledcWrite). A versão 7.x migrou para
; Arduino Core 3.x com API baseada em PINO — incompatível com nosso código.
;
; [ref: Seção 2 e 8 da AGENTS.md]

[env:esp32dev]
platform = espressif32@^6.0.0
board = esp32dev
framework = arduino
monitor_speed = 115200      ; baudrate da UART Pi<->ESP32 (decisão fechada)

; upload_speed = 921600     ; Descomente para upload mais rápido (opcional)
; monitor_filters = esp32_exception_decoder  ; Descomente para stack traces legíveis

lib_deps =
    bblanchon/ArduinoJson@^7
