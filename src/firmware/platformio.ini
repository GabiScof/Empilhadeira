; PlatformIO — firmware do ESP32 (baixo nível, tempo real).
; [ref: Seção 2 e 8 da AGENTS.md]

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7

[env:esp32_test]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    bblanchon/ArduinoJson@^7
    throwtheswitch/Unity@^2.6.1
test_build_src = yes
build_src_filter = +<protocol.cpp>